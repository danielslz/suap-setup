# docker/dev/docker-compose.yml - Ambiente de desenvolvimento SUAP
#
# Requer variáveis de ambiente (definidas pelo docker-setup.sh):
#   SUAP_DIR        - Caminho absoluto para a raiz do código SUAP
#   DOCKERFILE_DEV  - Caminho absoluto para o Dockerfile de desenvolvimento
#   PYTHON_VERSION  - Versão do Python (padrão: 3.12)

services:
  web:
    restart: always
    stdin_open: true
    tty: true
    user: "0:0"
    env_file:
      - ${SUAP_DIR}/.env
    build:
      context: ${SUAP_DIR}
      dockerfile: ${DOCKERFILE_DEV}
      args:
        - PYTHON_VERSION=${PYTHON_VERSION:-3.12}
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "${APP_PORT:-8000}:8000"
    ulimits:
      memlock: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - type: bind
        source: ${SUAP_DIR}
        target: /opt/suap
    healthcheck:
      test: curl --fail -s http://web:8000/accounts/login/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - suap
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery:
    restart: always
    stdin_open: true
    tty: true
    user: "0:0"
    env_file:
      - ${SUAP_DIR}/.env
    build:
      context: ${SUAP_DIR}
      dockerfile: ${DOCKERFILE_DEV}
    command: ./bin/celery.sh ${CELERY_QUEUE:-geral,celery_beat} --autoreload
    ulimits:
      memlock: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - type: bind
        source: ${SUAP_DIR}
        target: /opt/suap
    networks:
      - suap
    healthcheck:
      test: celery -A suap inspect ping || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery-beat:
    restart: always
    stdin_open: true
    tty: true
    user: "0:0"
    env_file:
      - ${SUAP_DIR}/.env
    build:
      context: ${SUAP_DIR}
      dockerfile: ${DOCKERFILE_DEV}
    command: ./bin/celery-beat.sh ${CELERY_QUEUE:-geral,celery_beat}
    ulimits:
      memlock: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - type: bind
        source: ${SUAP_DIR}
        target: /opt/suap
    networks:
      - suap
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery-flower:
    restart: always
    stdin_open: true
    tty: true
    env_file:
      - ${SUAP_DIR}/.env
    build:
      context: ${SUAP_DIR}
      dockerfile: ${DOCKERFILE_DEV}
    command: ./bin/celery-flower.sh ${CELERY_BROKER_URL:-redis://redis:6379/1} ${CELERY_FLOWER_AUTH:-admin:admin}
    ulimits:
      memlock: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - type: bind
        source: ${SUAP_DIR}
        target: /opt/suap
    ports:
      - "5555:5555"
    networks:
      - suap
    healthcheck:
      test: celery -A suap inspect ping || exit 1
      interval: 30s
      timeout: 10s
      retries: 5

  cron:
    restart: always
    stdin_open: true
    tty: true
    user: "0:0"
    env_file:
      - ${SUAP_DIR}/.env
    build:
      context: ${SUAP_DIR}
      dockerfile: ${DOCKERFILE_DEV}
    command: cron -f
    ulimits:
      memlock: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - type: bind
        source: ${SUAP_DIR}
        target: /opt/suap
      - type: bind
        source: ${SUAP_DIR}/.env
        target: /etc/environment
        read_only: true
    networks:
      - suap

  db:
    restart: always
    env_file:
      - ${SUAP_DIR}/.env
    image: postgres:${POSTGRES_VERSION:-16}
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-suap}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DATABASE_EXTERNAL_PORT:-5432}:5432"
    shm_size: 512mb
    ulimits:
      memlock: -1
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - suap
    healthcheck:
      test: pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-suap}
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    restart: always
    image: redis:latest
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    networks:
      - suap
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  suap:
    driver: bridge

volumes:
  pgdata:
