# docker/prod/docker-compose.prod.yml - Ambiente de produção SUAP
# Alinhado com estrutura oficial do SUAP
#
# Context de build: raiz do repositório SUAP (dois níveis acima)
# Serviços: web, celery-worker, celery-beat, celery-flower, cron, redis, nginx

services:
  web:
    build:
      context: ../..
      dockerfile: docker/prod/Dockerfile
      args:
        - PYTHON_VERSION=${PYTHON_VERSION:-3.12}
    env_file:
      - ../../.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    ulimits:
      memlock: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - static:/opt/suap/static
      - media:/opt/suap/deploy/media
      - logs:/opt/suap/deploy/logs
    healthcheck:
      test: curl --fail -s http://localhost:8000/accounts/login/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - suap
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery-worker:
    build:
      context: ../..
      dockerfile: docker/prod/Dockerfile
      args:
        - PYTHON_VERSION=${PYTHON_VERSION:-3.12}
    command: ./bin/celery.sh ${CELERY_QUEUE:-geral,celery_beat}
    env_file:
      - ../../.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    ulimits:
      memlock: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - logs:/opt/suap/deploy/logs
    networks:
      - suap
    healthcheck:
      test: celery -A suap inspect ping || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery-beat:
    build:
      context: ../..
      dockerfile: docker/prod/Dockerfile
      args:
        - PYTHON_VERSION=${PYTHON_VERSION:-3.12}
    command: ./bin/celery-beat.sh ${CELERY_QUEUE:-geral,celery_beat}
    env_file:
      - ../../.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    ulimits:
      memlock: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - logs:/opt/suap/deploy/logs
    networks:
      - suap
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery-flower:
    build:
      context: ../..
      dockerfile: docker/prod/Dockerfile
      args:
        - PYTHON_VERSION=${PYTHON_VERSION:-3.12}
    command: ./bin/celery-flower.sh ${CELERY_BROKER_URL:-redis://redis:6379/1} ${CELERY_FLOWER_AUTH:-admin:admin}
    env_file:
      - ../../.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    ulimits:
      memlock: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "5555:5555"
    networks:
      - suap
    healthcheck:
      test: celery -A suap inspect ping || exit 1
      interval: 30s
      timeout: 10s
      retries: 5

  cron:
    build:
      context: ../..
      dockerfile: docker/prod/Dockerfile
      args:
        - PYTHON_VERSION=${PYTHON_VERSION:-3.12}
    command: cron -f
    user: "0:0"
    env_file:
      - ../../.env
    restart: unless-stopped
    ulimits:
      memlock: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - media:/opt/suap/deploy/media
      - logs:/opt/suap/deploy/logs
      - type: bind
        source: ../../.env
        target: /etc/environment
        read_only: true
    networks:
      - suap

  redis:
    image: redis:latest
    restart: unless-stopped
    networks:
      - suap
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "8001:8001"
    volumes:
      - ../../nginx/suap.docker:/etc/nginx/templates/suap.conf.template:ro
      - static:/opt/suap/static:ro
      - media:/opt/suap/deploy/media:ro
      - logs:/opt/suap/deploy/logs/nginx
    environment:
      - NGINX_SERVER_NAME=${NGINX_SERVER_NAME:-_}
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - suap

networks:
  suap:
    driver: bridge

volumes:
  static:
  media:
  logs:
